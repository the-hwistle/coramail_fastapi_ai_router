services:
  api:
    build:
      context: .
    command: uv run uvicorn app:app --host 0.0.0.0 --port 8011
    environment:
      CORAMAIL_PIPELINE_DIR: /app/pipeline
      OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./pipeline:/app/pipeline
    ports:
      - "8011:8011"

  frontend-html:
    build:
      context: .
    command: uv run streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501 --server.headless true
    environment:
      CORAMAIL_API_BASE_URL: http://127.0.0.1:8011
    depends_on:
      - api
    ports:
      - "8501:8501"

  frontend-native:
    build:
      context: .
    command: uv run streamlit run streamlit_native_app.py --server.address 0.0.0.0 --server.port 8502 --server.headless true
    environment:
      CORAMAIL_API_BASE_URL: http://api:8011
    depends_on:
      - api
    ports:
      - "8502:8502"
